};

// Initializer
document.addEventListener('DOMContentLoaded', () => {
  initClock();
  setupEventListeners();
  loadLocalData();
  
  if (window.google && google.script) {
    google.script.run.withSuccessHandler(url => {
      if (url) {
        API_URL = url;
        document.getElementById('apiUrlInput').value = API_URL;
        fetchCloudData();
      }
    }).getScriptUrl();
  } else {
    document.getElementById('btnLogin').disabled = false;
    document.getElementById('btnLogin').innerText = 'Log Masuk';
  }
});

function initClock() {
  setInterval(() => {
    const now = new Date();
    document.getElementById('clockTime').innerText = now.toLocaleTimeString('ms-MY');
    document.getElementById('clockDate').innerText = now.toLocaleDateString('ms-MY', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
  }, 1000);
}

function loadLocalData() {
  const local = localStorage.getItem('rekod_tp_data');
  if (local) {
    try {
      const parsed = JSON.parse(local);
      state = { ...state, ...parsed };
    } catch(e) { console.error('Error parsing local storage', e); }
  }
  refreshUI();
}

function saveLocalData() {
  localStorage.setItem('rekod_tp_data', JSON.stringify(state));
}

function refreshUI() {
  populateClassDropdowns();
  renderDashboard();
  renderMuridTable();
  renderRekodTable();
  renderTajukList();
  renderExamTable();
  renderGuruTable();
  renderAnalysis();
  
  document.getElementById('bannerSchoolLine').innerText = `${state.schoolName} (${state.schoolCode})`;
  document.getElementById('setSchoolName').value = state.schoolName;
  document.getElementById('setSchoolCode').value = state.schoolCode;
  document.getElementById('setDeadlineText').value = state.deadlineText;
  document.getElementById('setDeadlineDate').value = state.deadlineDate;
}

// Dialog Custom Prompt & Confirm
function showConfirm(msg, onYes) {
  const m = document.getElementById('confirmModal');
  document.getElementById('confirmMsg').innerText = msg;
  m.classList.add('open');
  
  const yesBtn = document.getElementById('btnConfirmYes');
  const noBtn = document.getElementById('btnConfirmNo');
  
  const cleanUp = () => {
    m.classList.remove('open');
    yesBtn.onclick = null;
    noBtn.onclick = null;
  };
  
  yesBtn.onclick = () => { cleanUp(); onYes(); };
  noBtn.onclick = cleanUp;
}

function showPrompt(msg, defaultVal, onOk) {
  const m = document.getElementById('promptModal');
  document.getElementById('promptMsg').innerText = msg;
  const input = document.getElementById('promptInput');
  input.value = defaultVal || '';
  m.classList.add('open');
  
  const okBtn = document.getElementById('btnPromptOk');
  const cancelBtn = document.getElementById('btnPromptCancel');
  
  const cleanUp = () => {
    m.classList.remove('open');
    okBtn.onclick = null;
    cancelBtn.onclick = null;
  };
  
  okBtn.onclick = () => { const val = input.value; cleanUp(); onOk(val); };
  cancelBtn.onclick = cleanUp;
}

function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerText = msg;
  container.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Event Listeners Setup
function setupEventListeners() {
  // Mobile Sidebar Toggle
  document.getElementById('btnMenuToggle').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  });
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  });

  // Navigation Items
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const view = btn.dataset.view;
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      
      btn.classList.add('active');
      const targetView = document.querySelector(`.view[data-view="${view}"]`);
      if (targetView) targetView.classList.add('active');
      
      if (window.innerWidth <= 900) {
        document.querySelector('.sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('show');
      }
    });
  });

  // Login Handler
  document.getElementById('btnLogin').addEventListener('click', handleLogin);
  document.getElementById('btnLogout').addEventListener('click', handleLogout);

  // Murid Actions
  document.getElementById('btnTambahMurid').addEventListener('click', () => {
    document.getElementById('modalMuridTitle').innerText = 'Tambah Murid Baru';
    document.getElementById('muridEditIndex').value = '-1';
    document.getElementById('muridNama').value = '';
    document.getElementById('modalMurid').classList.add('open');
  });
  document.getElementById('btnSimpanMurid').addEventListener('click', saveMurid);
  document.getElementById('muridSearch').addEventListener('input', renderMuridTable);
  document.getElementById('muridFilterKelas').addEventListener('change', renderMuridTable);

  // Rekod TP Pukal Actions
  document.getElementById('btnUploadPukal').addEventListener('click', openPukalModal);
  document.getElementById('btnKeStep2').addEventListener('click', () => {
    document.getElementById('pukalStep1').style.display = 'none';
    document.getElementById('pukalStep2').style.display = 'block';
    document.getElementById('stepDot1').classList.remove('active');
    document.getElementById('stepDot1').classList.add('done');
    document.getElementById('stepDot2').classList.add('active');
    renderPukalStudentList();
  });
  document.getElementById('btnKeStep1').addEventListener('click', () => {
    document.getElementById('pukalStep2').style.display = 'none';
    document.getElementById('pukalStep1').style.display = 'block';
    document.getElementById('stepDot2').classList.remove('active');
    document.getElementById('stepDot1').classList.add('active');
  });
  document.getElementById('btnSimpanPukal').addEventListener('click', savePukalRekod);

  // TP Buttons Selection in Pukal Modal
  document.querySelectorAll('#pukalTpBtns .tp-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      document.querySelectorAll('#pukalTpBtns .tp-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  // Guru (Admin) Actions
  document.getElementById('btnTambahGuru').addEventListener('click', () => {
    document.getElementById('modalGuruTitle').innerText = 'Tambah Akaun Guru';
    document.getElementById('guruEditIndex').value = '-1';
    document.getElementById('guruNama').value = '';
    document.getElementById('guruUsername').value = '';
    document.getElementById('guruPassword').value = '';
    document.getElementById('modalGuru').classList.add('open');
  });
  document.getElementById('btnSimpanGuru').addEventListener('click', saveGuru);

  // Maintenance Settings
  document.getElementById('btnSimpanSekolah').addEventListener('click', () => {
    state.schoolName = document.getElementById('setSchoolName').value.trim();
    state.schoolCode = document.getElementById('setSchoolCode').value.trim();
    saveLocalData();
    refreshUI();
    showToast('Maklumat sekolah berjaya disimpan');
  });

  document.getElementById('btnSimpanDeadline').addEventListener('click', () => {
    state.deadlineText = document.getElementById('setDeadlineText').value.trim();
    state.deadlineDate = document.getElementById('setDeadlineDate').value;
    saveLocalData();
    refreshUI();
    showToast('Peringatan deadline berjaya disimpan');
  });

  // Printing Reports
  document.getElementById('printUpsaAll').addEventListener('click', () => printReport('UPSA'));
  document.getElementById('printUasaAll').addEventListener('click', () => printReport('UASA'));
  document.getElementById('printAll').addEventListener('click', () => printReport('TP_ALL'));
  document.getElementById('printIndividu').addEventListener('click', () => {
    showPrompt('Masukkan Nama Penuh Murid:', '', (nama) => {
      if (nama) printReport('INDIVIDUAL', nama);
    });
  });

  // Import / Export CSV
  document.getElementById('btnImportCsv').addEventListener('click', () => document.getElementById('modalImportCsv').classList.add('open'));
  document.getElementById('btnProsesCsv').addEventListener('click', handleImportCsv);
  document.getElementById('btnEksportCsv').addEventListener('click', handleExportCsv);
  document.getElementById('btnTongSampah').addEventListener('click', renderTrashModal);
}

// User Auth
function handleLogin() {
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value.trim();
  const err = document.getElementById('loginError');

  const found = state.gurus.find(g => g.username === u && g.pass === p);
  if (found) {
    currentUser = found;
    found.lastLogin = new Date().toLocaleString('ms-MY');
    saveLocalData();

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'flex';
    document.getElementById('userNameLabel').innerText = `${found.nama} (${found.role})`;
    document.getElementById('greetingText').innerText = `Selamat Datang, ${found.nama}`;

    // Admin-only view protection
    if (found.role !== 'Admin') {
      document.querySelectorAll('.admin-only-nav').forEach(el => el.style.display = 'none');
    } else {
      document.querySelectorAll('.admin-only-nav').forEach(el => el.style.display = 'block');
    }

    refreshUI();
    showToast('Log masuk berjaya!');
  } else {
    err.innerText = 'Nama pengguna atau kata laluan salah!';
  }
}

function handleLogout() {
  currentUser = null;
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').innerText = '';
}

// Helpers for Dropdowns
function populateClassDropdowns() {
  const classes = [...new Set(state.murids.filter(m => m.status === 'Aktif').map(m => m.kelas))].sort();
  const options = ['<option value="ALL">Semua Kelas</option>', ...classes.map(c => `<option value="${c}">${c}</option>`)].join('');

  document.getElementById('classSelect').innerHTML = options;
  document.getElementById('muridFilterKelas').innerHTML = options;
  document.getElementById('rekodFilterKelas').innerHTML = options;
  document.getElementById('examKelasSelect').innerHTML = classes.map(c => `<option value="${c}">${c}</option>`).join('');
  document.getElementById('pukalKelas').innerHTML = classes.map(c => `<option value="${c}">${c}</option>`).join('');
  document.getElementById('muridKelas').innerHTML = classes.map(c => `<option value="${c}">${c}</option>`).join('');
}

// Dashboard View
function renderDashboard() {
  const activeMurids = state.murids.filter(m => m.status === 'Aktif');
  const totalRekods = state.rekods.length;
  const totalExams = state.exams.length;

  const statGrid = document.getElementById('dashStatGrid');
  statGrid.innerHTML = `
    <div class="stat-card">
      <div class="stat-icon" style="background:#e0f2fe;color:#0284c7;">🎓</div>
      <div>
        <div class="stat-num">${activeMurids.length}</div>
        <div class="stat-lbl">Jumlah Murid</div>
        <div class="stat-sub">Aktif</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#fef3c7;color:#d97706;">📝</div>
      <div>
        <div class="stat-num">${totalRekods}</div>
        <div class="stat-lbl">Rekod Eviden</div>
        <div class="stat-sub">Telah Direkod</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#dcfce7;color:#15803d;">🖊️</div>
      <div>
        <div class="stat-num">${totalExams}</div>
        <div class="stat-lbl">Markah Ujian</div>
        <div class="stat-sub">UPSA / UASA</div>
      </div>
    </div>
  `;

  // Class Progress
  const classProgress = document.getElementById('dashClassProgress');
  const classes = [...new Set(activeMurids.map(m => m.kelas))];
  
  if(classes.length === 0) {
    classProgress.innerHTML = '<div class="empty-row">Tiada data kelas</div>';
  } else {
    classProgress.innerHTML = classes.map(cls => {
      const count = activeMurids.filter(m => m.kelas === cls).length;
      const recCount = state.rekods.filter(r => {
        const m = state.murids.find(sm => sm.nama === r.nama);
        return m && m.kelas === cls;
      }).length;
      const pct = Math.min(100, Math.round((recCount / (count * 6)) * 100)) || 0;

      return `
        <div class="class-progress-card">
          <div class="ring" style="--pct:${pct};">
            <div class="ring-inner">${pct}%</div>
          </div>
          <div class="cp-info">
            <div class="cname">${cls}</div>
            <div class="cmeta">${count} murid • ${recCount} rekod</div>
            <div class="cp-bar"><div class="cp-bar-fill" style="width:${pct}%;"></div></div>
          </div>
        </div>
      `;
    }).join('');
  }

  // Dashboard Alerts
  const alerts = document.getElementById('dashAlerts');
  alerts.innerHTML = `
    <div class="alert-box">
      <span class="a-icon">📅</span>
      <div>
        <b>${state.deadlineText}</b>
        <div class="a-sub">Tarikh Akhir: ${state.deadlineDate}</div>
      </div>
    </div>
  `;
}

// Murid View Table
function renderMuridTable() {
  const search = document.getElementById('muridSearch').value.toLowerCase();
  const filterK = document.getElementById('muridFilterKelas').value;

  const filtered = state.murids.filter(m => {
    const matchStatus = m.status === 'Aktif';
    const matchSearch = m.nama.toLowerCase().includes(search);
    const matchKelas = filterK === 'ALL' || m.kelas === filterK;
    return matchStatus && matchSearch && matchKelas;
  });

  document.getElementById('muridCountLabel').innerText = `Senarai Murid (${filtered.length})`;
  const tbody = document.getElementById('muridTbody');

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-row">Tiada murid dijumpai</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map((m, idx) => `
    <tr>
      <td><b>${m.nama}</b></td>
      <td>${m.kelas}</td>
      <td><span class="gender-icon">${m.jantina === 'L' ? '👦' : '👧'}</span>${m.jantina}</td>
      <td><span class="badge" style="background:#dcfce7;color:#15803d;">${m.status}</span></td>
      <td>
        <button class="icon-btn" onclick="deleteMurid('${m.nama}')" title="Padam ke Tong Sampah">🗑️</button>
      </td>
    </tr>
  `).join('');

  const trashCount = state.murids.filter(m => m.status === 'Dipadam').length;
  document.getElementById('trashCount').innerText = trashCount;
}

function saveMurid() {
  const nama = document.getElementById('muridNama').value.trim();
  const kelas = document.getElementById('muridKelas').value;
  const jantina = document.getElementById('muridJantina').value;

  if (!nama) { showToast('Sila masukkan nama murid'); return; }

  state.murids.push({ nama, kelas, jantina, status: 'Aktif' });
  saveLocalData();
  refreshUI();
  closeModal('modalMurid');
  showToast('Murid berjaya ditambah');
}

function deleteMurid(nama) {
  showConfirm(`Adakah anda pasti untuk memadam ${nama}?`, () => {
    const m = state.murids.find(sm => sm.nama === nama);
    if (m) m.status = 'Dipadam';
    saveLocalData();
    refreshUI();
    showToast('Murid dipindahkan ke Tong Sampah');
  });
}

function renderTrashModal() {
  const trashed = state.murids.filter(m => m.status === 'Dipadam');
  const tbody = document.getElementById('trashTbody');
  if (trashed.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty-row">Tong sampah kosong</td></tr>';
  } else {
    tbody.innerHTML = trashed.map(m => `
      <tr>
        <td>${m.nama}</td>
        <td>${m.kelas}</td>
        <td><button class="btn-outline btn-sm" onclick="restoreMurid('${m.nama}')">Pulihkan</button></td>
      </tr>
    `).join('');
  }
  document.getElementById('modalTrash').classList.add('open');
}

function restoreMurid(nama) {
  const m = state.murids.find(sm => sm.nama === nama);
  if (m) m.status = 'Aktif';
  saveLocalData();
  refreshUI();
  renderTrashModal();
  showToast('Murid berjaya dipulihkan');
}

// Rekod TP View
function renderRekodTable() {
  const filterK = document.getElementById('rekodFilterKelas').value;
  const filterTp = document.getElementById('rekodFilterTp').value;
  const search = document.getElementById('rekodSearch').value.toLowerCase();

  const filtered = state.rekods.filter(r => {
    const m = state.murids.find(sm => sm.nama === r.nama && sm.status === 'Aktif');
    if (!m) return false;
    const matchKelas = filterK === 'ALL' || m.kelas === filterK;
    const matchTp = filterTp === 'ALL' || r.tp === filterTp;
    const matchSearch = r.nama.toLowerCase().includes(search);
    return matchKelas && matchTp && matchSearch;
  });

  const tbody = document.getElementById('rekodTbody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-row">Tiada rekod TP dijumpai</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map((r, idx) => {
    const m = state.murids.find(sm => sm.nama === r.nama);
    return `
      <tr>
        <td><b>${r.nama}</b></td>
        <td>${m ? m.kelas : '-'}</td>
        <td><span class="badge ${r.tp.toLowerCase()}">${r.tp}</span></td>
        <td>${r.tajuk || '-'}</td>
        <td>${r.catatan || '-'}</td>
        <td><span style="color:var(--success);">✓ Sah</span></td>
        <td><button class="icon-btn" onclick="deleteRekod(${idx})">🗑️</button></td>
      </tr>
    `;
  }).join('');
}

function openPukalModal() {
  document.getElementById('pukalStep1').style.display = 'block';
  document.getElementById('pukalStep2').style.display = 'none';
  document.getElementById('stepDot1').className = 'step-dot active';
  document.getElementById('stepDot2').className = 'step-dot';

  // Populate Tajuk Dropdown
  const tajukSelect = document.getElementById('pukalTajuk');
  let options = '';
  for (let thn in state.tajuks) {
    options += `<optgroup label="${thn}">`;
    options += state.tajuks[thn].map(t => `<option value="${t}">${t}</option>`).join('');
    options += `</optgroup>`;
  }
  tajukSelect.innerHTML = options;

  document.getElementById('modalPukal').classList.add('open');
}

function renderPukalStudentList() {
  const k = document.getElementById('pukalKelas').value;
  const list = state.murids.filter(m => m.kelas === k && m.status === 'Aktif');
  const box = document.getElementById('pukalStudentList');

  box.innerHTML = list.map(m => `
    <label class="student-check">
      <input type="checkbox" class="chk-pukal-m" value="${m.nama}">
      <span>${m.nama}</span>
    </label>
  `).join('');

  document.getElementById('chkPilihSemua').onclick = (e) => {
    document.querySelectorAll('.chk-pukal-m').forEach(c => c.checked = e.target.checked);
  };
}

function savePukalRekod() {
  const selectedTpBtn = document.querySelector('#pukalTpBtns .tp-btn.selected');
  if (!selectedTpBtn) { showToast('Sila pilih Tahap Penguasaan (TP)'); return; }

  const tp = selectedTpBtn.dataset.tp;
  const tajuk = document.getElementById('pukalTajuk').value;
  const catatan = document.getElementById('pukalCatatan').value.trim();

  const selectedStudents = [];
  document.querySelectorAll('.chk-pukal-m:checked').forEach(c => selectedStudents.push(c.value));

  if (selectedStudents.length === 0) { showToast('Sila pilih sekurang-kurangnya seorang murid'); return; }

  selectedStudents.forEach(nama => {
    state.rekods.push({
      nama,
      tp,
      tajuk,
      catatan,
      tarikh: new Date().toISOString().split('T')[0]
    });
  });

  saveLocalData();
  refreshUI();
  closeModal('modalPukal');
  showToast(`Berjaya menyimpan rekod untuk ${selectedStudents.length} murid`);
}

function deleteRekod(idx) {
  showConfirm('Padam rekod ini?', () => {
    state.rekods.splice(idx, 1);
    saveLocalData();
    refreshUI();
    showToast('Rekod dipadam');
  });
}

// Tajuk & Criteria
function renderTajukList() {
  const flat = document.getElementById('tajukFlatList');
  let html = '';

  for (let thn in state.tajuks) {
    html += `<div class="tajuk-bidang-block">
      <h4>${thn}</h4>
      <div class="tajuk-chip-row">
        ${state.tajuks[thn].map((t, idx) => `
          <div class="tajuk-chip">
            <span>${t}</span>
            <button class="btn-outline btn-sm" onclick="openKriteriaModal('${t}')">📋 Kriteria</button>
            <span class="del" onclick="deleteTajuk('${thn}', ${idx})">&times;</span>
          </div>
        `).join('')}
      </div>
      <button class="btn-outline btn-sm" style="margin-top:8px;" onclick="addTajuk('${thn}')">➕ Tambah Tajuk ${thn}</button>
    </div>`;
  }
  flat.innerHTML = html;
}

function addTajuk(thn) {
  showPrompt(`Masukkan Tajuk Baru bagi ${thn}:`, '', (tajuk) => {
    if (tajuk) {
      state.tajuks[thn].push(tajuk);
      saveLocalData();
      refreshUI();
      showToast('Tajuk ditambah');
    }
  });
}

function deleteTajuk(thn, idx) {
  state.tajuks[thn].splice(idx, 1);
  saveLocalData();
  refreshUI();
  showToast('Tajuk dipadam');
}

function openKriteriaModal(tajuk) {
  document.getElementById('kriteriaTitle').innerText = `Kriteria: ${tajuk}`;
  const kr = state.kriterias[tajuk] || { rendah: '', sederhana: '', tinggi: '' };
  document.getElementById('kritRendah').value = kr.rendah;
  document.getElementById('kritSederhana').value = kr.sederhana;
  document.getElementById('kritTinggi').value = kr.tinggi;
  document.getElementById('kriteriaTajukIndex').value = tajuk;
  document.getElementById('modalKriteria').classList.add('open');
}

document.getElementById('btnSimpanKriteria').addEventListener('click', () => {
  const tajuk = document.getElementById('kriteriaTajukIndex').value;
  state.kriterias[tajuk] = {
    rendah: document.getElementById('kritRendah').value,
    sederhana: document.getElementById('kritSederhana').value,
    tinggi: document.getElementById('kritTinggi').value
  };
  saveLocalData();
  closeModal('modalKriteria');
  showToast('Kriteria disimpan');
});

// Exams Management
function renderExamTable() {
  const k = document.getElementById('examKelasSelect').value;
  const list = state.murids.filter(m => m.kelas === k && m.status === 'Aktif');

  const tbodyEntry = document.getElementById('examEntryTbody');
  tbodyEntry.innerHTML = list.map(m => `
    <tr>
      <td>${m.nama}</td>
      <td><input type="number" min="0" max="100" class="exam-score-input" data-nama="${m.nama}" style="width:80px;"></td>
      <td class="exam-gred-cell">-</td>
    </tr>
  `).join('');

  // Main Records Table
  const tbody = document.getElementById('examTbody');
  if (state.exams.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-row">Tiada rekod markah</td></tr>';
    return;
  }
  tbody.innerHTML = state.exams.map((e, idx) => `
    <tr>
      <td>${e.nama}</td>
      <td><b>${e.markah}</b></td>
      <td><span class="badge" style="background:#e0e7ff;color:#3730a3;">${e.gred}</span></td>
      <td>${e.tarikh}</td>
      <td><button class="icon-btn" onclick="deleteExam(${idx})">🗑️</button></td>
    </tr>
  `).join('');
}

document.getElementById('btnSimpanMarkahSemua').addEventListener('click', () => {
  const inputs = document.querySelectorAll('.exam-score-input');
  const tarikh = document.getElementById('examTarikh').value || new Date().toISOString().split('T')[0];
  const jenis = document.querySelector('.mode-toggle button.active').innerText;

  let count = 0;
  inputs.forEach(inp => {
    const val = inp.value;
    if (val !== '') {
      const markah = parseInt(val);
      let gred = 'F';
      if (markah >= 85) gred = 'A';
      else if (markah >= 70) gred = 'B';
      else if (markah >= 60) gred = 'C';
      else if (markah >= 50) gred = 'D';
      else if (markah >= 40) gred = 'E';

      state.exams.push({ nama: inp.dataset.nama, markah, gred, jenis, tarikh });
      count++;
    }
  });

  saveLocalData();
  refreshUI();
  showToast(`Simpan ${count} rekod markah ${jenis}`);
});

function deleteExam(idx) {
  state.exams.splice(idx, 1);
  saveLocalData();
  refreshUI();
  showToast('Markah dipadam');
}

// Guru Management (Admin)
function renderGuruTable() {
  const tbody = document.getElementById('guruTbody');
  document.getElementById('guruCountLabel').innerText = `Senarai Akaun (${state.gurus.length})`;

  tbody.innerHTML = state.gurus.map((g, idx) => `
    <tr>
      <td><b>${g.nama}</b></td>
      <td><code>${g.username}</code></td>
      <td><span class="role-chip ${g.role.toLowerCase()}">${g.role}</span></td>
      <td>${g.contact || '-'}</td>
      <td>${g.lastLogin || '-'}</td>
      <td>
        ${g.username !== 'admin' ? `<button class="icon-btn" onclick="deleteGuru(${idx})">🗑️</button>` : ''}
      </td>
    </tr>
  `).join('');

function saveGuru() {
  const nama = document.getElementById('guruNama').value.trim();
  const username = document.getElementById('guruUsername').value.trim();
  const pass = document.getElementById('guruPassword').value.trim();
  const role = document.getElementById('guruRole').value;
  const contact = document.getElementById('guruContact').value.trim();

  if (!nama || !username || !pass) { showToast('Sila lengkapkan borang'); return; }

  state.gurus.push({ nama, username, pass, role, contact, lastLogin: '-' });
  saveLocalData();
  refreshUI();
  closeModal('modalGuru');
  showToast('Akaun guru berjaya ditambah');
}

function deleteGuru(idx) {
  showConfirm('Padam akaun guru ini?', () => {
    state.gurus.splice(idx, 1);
    saveLocalData();
    refreshUI();
    showToast('Akaun guru dipadam');
  });
}

// Analysis View (Chart.js)
function renderAnalysis() {
  const ctx = document.getElementById('analysisChart');
  if (!ctx) return;

  if (chartInstance) chartInstance.destroy();

  const counts = { TP1: 0, TP2: 0, TP3: 0, TP4: 0, TP5: 0, TP6: 0 };
  state.rekods.forEach(r => { if (counts[r.tp] !== undefined) counts[r.tp]++; });

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['TP1', 'TP2', 'TP3', 'TP4', 'TP5', 'TP6'],
      datasets: [{
        label: 'Bilangan Eviden TP',
        data: Object.values(counts),
        backgroundColor: ['#fecaca', '#fed7aa', '#fde68a', '#bfdbfe', '#99f6e4', '#ddd6fe'],
        borderColor: ['#dc2626', '#ea580c', '#ca8a04', '#2563eb', '#0d9488', '#7c3aed'],
        borderWidth: 1.5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } }
    }
  });
}

// CSV Export / Import
function handleExportCsv() {
  let csv = 'Nama,Kelas,TP,Tajuk,Catatan,Tarikh\n';
  state.rekods.forEach(r => {
    const m = state.murids.find(sm => sm.nama === r.nama);
    csv += `"${r.nama}","${m ? m.kelas : ''}","${r.tp}","${r.tajuk || ''}","${r.catatan || ''}","${r.tarikh || ''}"\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', `rekod_tp_${new Date().toISOString().split('T')[0]}.csv`);
  a.click();
}

function handleImportCsv() {
  const file = document.getElementById('csvFileInput').files[0];
  if (!file) { showToast('Sila pilih fail CSV'); return; }

  const reader = new FileReader();
  reader.onload = (e) => {
    const lines = e.target.result.split('\n');
    let added = 0;
    lines.forEach((line, i) => {
      if (i === 0 || !line.trim()) return;
      const [nama, kelas, jantina] = line.split(',').map(s => s.replace(/"/g, '').trim());
      if (nama && kelas) {
        state.murids.push({ nama, kelas, jantina: jantina || 'L', status: 'Aktif' });
        added++;
      }
    });
    saveLocalData();
    refreshUI();
    closeModal('modalImportCsv');
    showToast(`Berjaya import ${added} murid`);
  };
  reader.readAsText(file);
}

// Print Handler
function printReport(type, targetNama) {
  const pArea = document.getElementById('printArea');
  pArea.innerHTML = '';

  if (type === 'INDIVIDUAL' && targetNama) {
    const m = state.murids.find(sm => sm.nama.toLowerCase() === targetNama.toLowerCase());
    if (!m) { showToast('Murid tidak dijumpai!'); return; }

    const mRekods = state.rekods.filter(r => r.nama === m.nama);
    pArea.innerHTML = `
      <div style="text-align:center;margin-bottom:20px;">
        <h2>${state.schoolName}</h2>
        <h3>REKOD PERKEMBANGAN MURID (PBD)</h3>
      </div>
      <p><b>Nama:</b> ${m.nama}</p>
      <p><b>Kelas:</b> ${m.kelas}</p>
      <table border="1" style="width:100%;border-collapse:collapse;margin-top:14px;">
        <thead><tr><th>TP</th><th>Tajuk / Eviden</th><th>Catatan</th><th>Tarikh</th></tr></thead>
        <tbody>
          ${mRekods.length ? mRekods.map(r => `
            <tr><td>${r.tp}</td><td>${r.tajuk}</td><td>${r.catatan}</td><td>${r.tarikh}</td></tr>
          `).join('') : '<tr><td colspan="4" style="text-align:center;">Tiada rekod TP</td></tr>'}
        </tbody>
      </table>
    `;
  } else {
    pArea.innerHTML = `
      <div style="text-align:center;margin-bottom:20px;">
        <h2>${state.schoolName}</h2>
        <h3>LAPORAN PENTAKSIRAN PENDIDIKAN ISLAM</h3>
      </div>
      <table border="1" style="width:100%;border-collapse:collapse;">
        <thead><tr><th>Nama</th><th>Kelas</th><th>Bil. Eviden TP</th></tr></thead>
        <tbody>
          ${state.murids.filter(m => m.status === 'Aktif').map(m => {
            const count = state.rekods.filter(r => r.nama === m.nama).length;
            return `<tr><td>${m.nama}</td><td>${m.kelas}</td><td>${count}</td></tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
  }

  window.print();
}

function fetchCloudData() {
  if (!API_URL) return;
  fetch(API_URL + '?action=getData')
    .then(res => res.json())
    .then(data => {
      if (data) {
        state = { ...state, ...data };
        saveLocalData();
        refreshUI();
        showToast('Data dikemaskini dari Google Sheets');
      }
    }).catch(e => console.error('Cloud Sync Error', e));
}
